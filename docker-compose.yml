version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leetjudge-backend
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      # Mount the host directory to enable hot-reloading
      - ./backend:/usr/src/app
      # Prevent host node_modules from overriding container node_modules
      - /usr/src/app/node_modules
    env_file:
      - ./backend/.env
    command: npm run dev
    restart: unless-stopped
